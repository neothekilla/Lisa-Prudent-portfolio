    /* =========================

    ========================= */
  
    const projectDescriptions = {
      fr: {
        '01': '[01] — Générations de motifs & de trames par le détournement des caractères du CP437 (via Procesing et P5.js). La confrontation avec des images végétales créé un dialogue entre code et organique. ↗<a href="https://cpbloom.netlify.app/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer;">Un site web</a> archive ces expérimentations graphiques, en explorant le mouvement et les limites des caractères.',
        '02': '[02] — ↗<a href="https://neothekilla.github.io/STUTTGART-WEB/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer; ">Site web</a> personnel qui capture tous les objets et souvenirs de mon stage réalisé à Stuttgart. Agissant comme une capsule temporelle, le site devient une fenêtre sur mon expérience vécue au cours de ces quatre mois et renvoi également sur deux autres pages complémentaires. ',
        '03': '[03] — Projet inscrit dans la continuité d\'un stage réalisé au sein de l\'agence ↗<a href="https://www.l2m3.com/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer; ">L2M3</a>. Suite à une collaboration avec Cyber Valley, institut de recherche basé à Tübingen, une série d\'animations en motion design a été réalisée pour retranscrire différentes atmosphères agréables, pensées pour le confort des usagers.',     
        '04': '[04] — Poster conçu pour promouvoir la projection du film sulfureux et incongru, The Dreamers. Le projet prend place à la suite d\'une collaboration entre le Ciné Club Dulac de la Faculté des Arts d\'Amiens et l\'ÉSAD d\'Amiens.',
        '05': '[05] — Exploration née de la rencontre entre les trames numériques et le  tatouage. ↗<a href="https://neothekilla.github.io/A-Map-of-Tattooing/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer; ">Ce site web</a>, conçu comme le prolongement de mon mémoire de DNSEP, propose une immersion dans le travail des artistes tatoueur·euses grâce à une navigation par tags et par scroll horizontal. Le corps  devient un réel support de navigation, jouant le rôle d\'une carte, à la croisée du tatouage et de l’art génératif.',
        '06': '[06] — Mémoire de DNSEP réalisé en Web to print, qui explore les scènes marginales situées au croisement entre design graphique et tatouage. Il analyse comment outils, gestes et espaces de travail façonnent de nouvelles habitudes créatives. L’étude défend des modes de création hybrides, collaboratifs et faits mains face à la standardisation et la productivité de nos protocoles de travail usuels.',
        '07': '[07] — Proposition d\'affiche pour les journées portes ouvertes de l\'ÉSAD Amiens. L\'affiche s’enrichit d’une dimension hybride grâce à l\'intégration de la réalité augmentée, dont les motifs viennent orner le visuel et lui apporter du relief. ',
        '08': '[08] — En me plaçant à la fois en tant que graphiste et commissaire d’exposition, Young & Fool est une exposition fictive qui souligne différents regards sur la période ambiguë de la jeunesse. À travers la sélection de trois photographes, l\'éphéméra muséal devient un support de communication intéressant à détourner, notamment par sa numérisation. L\'usage du rouge évoque les valeurs clés de subversion et de sensualité liées à l\'exposition.',
        '09': '[09] — Projet collaboratif de création d’une identité visuelle placée sous le signe des phénomènes météorologiques. Réalisé à l’occasion d’une journée de conférences dédiée à la présentation de nos sujets de mémoire de DNSEP. L’identité visuelle s’appuie sur une esthétique saturée, inspirée des codes graphiques des cartes météo. Le nuage, élément central du projet pour son fort potentiel graphique, se déploie sur l’ensemble des supports, notamment à travers une animation atmosphérique conçue avec Processing. Puis il y a également un zoom sur les 80 programmes pliables distribués en amont des conférences. ',
        '10': '[10] — Affiche pour l\'exposition Next stop: Erasmus. Cette exposition valorise les travaux réalisés par les étudiant·es parti·es à l’étranger dans le cadre du programme Erasmus ou de stages en 2024–2025. L\'univers du bus se caractérise par un détournement des signes routiers et du véhicule lui-même.',
        '11': '[11] — Proposition de mise en forme d’un document pour les nouvelles acquisitions semestrielles de la documentation de l’ÉSAD Amiens. L’objectif est d’organiser les catégories existantes pour faciliter la consultation et la recherche, chaque sujet étant identifié via la création d\'un pictogramme unique, au dessin oscillant entre rigueur et convivialité. Cet objet pérenne, repose sur des impressions sur des feuilles de brouillon et par l\'usage d\'une reliure amovible.',
        '12': '[12] — T-shirt réalisé pour le club mix de mon école à l\'Ésad Amiens. Cette sérigraphie en trichromie valorise une esthétique futuriste des années 2000. Basé sur un jeu de trame et d\'une composition aérée, l\'usage de typographies libres et expérimentales s\'inspire de cette époque nostalgique à l\' ère d\'un numérique.',
      },
      en: {
        '01': '[01] — Generations of patterns and  graphic grids using CP437 characters (through Processing and P5.js). The combination with vegetable images creates a dialogue between code and organic shapes. Moreover, a ↘<a href="https://cpbloom.netlify.app/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer;">website</a> archives these graphic experiments, exploring the movement and limits of the characters.',
        '02': '[02] — ↘<a href="https://neothekilla.github.io/STUTTGART-WEB/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer; ">Personal website</a> that captures all the objects and memories from my internship in Stuttgart. Acting like a time capsule, the site becomes a window into my experience over these four months and also links to two other complementary pages.',
        '03': '[03] — Project developed as part of an internship at the agency ↘<a href="https://www.l2m3.com/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer; ">L2M3</a>. Following a collaboration with Cyber Valley, a research institute based in Tübingen, a series of motion design animations was created to convey different pleasant atmospheres, designed for the comfort of users.',
        '04': '[04] — Poster designed to promote the screening of the incongruous and sulfurous film, The Dreamers. The project was created following a collaboration between the Ciné Club Dulac of the Faculty of Arts in Amiens and the ÉSAD Amiens',
        '05': '[05] — Exploration born from the meeting of digital patterns and tattooing. ↘<a href="https://neothekilla.github.io/A-Map-of-Tattooing/" target="_blank" rel="noopener noreferrer" style="color: #ff6b35; text-decoration: underline; text-decoration-style: dotted; cursor: pointer; ">This website</a>, designed as an extension of my DNSEP thesis, offers an immersion into the work of tattoo artists with navigation by tags and horizontal scrolling. The body becomes a real navigation surface, at the crossing of tattoo and generative art.',
        '06': '[06] — DNSEP thesis produced in a web-to-print format, exploring marginal scenes at the intersection of graphic design and tattooing. It examines how tools, gestures and workspaces shape new creative habits. The study advocates for hybrid, collaborative and handmade modes of creation in response to the standardization and productivity-driven nature of our usual work processes. The binding screws echo the DIY theme present in the thesis and actively involve the user who can unscrew them to fully open the publication flat.',
        '07': '[07] — Poster design proposal for the open days at ÉSAD Amiens. The poster includes a hybrid dimension with the integration of augmented reality, where patterns decorate the visual and give it depth',
        '08': '[08] — Placing myself both as a graphic designer and a curator, Young & Fool is a fictional exhibition that shows different perspectives on the ambiguous period of youth. Through the work of three photographers, the museum ephemera becomes an interesting communication tool to reinterpret, especially through digitization. The use of red highlights the key values of subversion and sensuality connected to the exhibition.',
        '09': '[09] — Collaborative project to create a visual identity centered around meteorological phenomena. Developed for a conference day dedicated to the presentation of our DNSEP thesis topics. The visual identity is based on a saturated aesthetic inspired by the graphic codes of weather maps. The cloud is a central element of the project due to its strong graphic potential unfolds across all media, particularly through an atmospheric animation created with Processing. Then there is a focus on the 80 foldable programs distributed before the conferences. ',
        '10': '[10] — Poster for the exhibition Next stop: Erasmus. This exhibition highlights the work done by students who went abroad as part of the Erasmus program or internships in 2024–2025. The bus world is marked by a playful use of road signs and the vehicle itself.',
        '11': '[11] — Proposal for the layout of a document for the new semester acquisitions of the ÉSAD Amiens documentation. The goal is to organize existing categories to make browsing and searching easier, with each topic identified by a unique pictogram, designed between precision and friendliness. This lasting object is made using recycled sheets and a removable binding.',
        '12': '[12] — T-shirt created for the mix club of my school at Ésad Amiens. This three-color screen print shows a “Y2K futurism” aesthetic. Based on halftone patterns and a light composition, the use of free and experimental typeface is inspired by this nostalgic era.',
      }
    };

    ========================= */
  
    const projectMediums = {
      fr: {
        '01': 'Édition & Web',
        '02': 'Web',
        '03': 'Motion',
        '04': 'Affiche',
        '05': 'Web',
        '06': 'Édition',
        '07': 'Affiche',
        '08': 'Identité visuelle',
        '09': 'Identité visuelle',
        '10': 'Affiche',
        '11': 'Édition',
        '12': 'Illustration'
      },
      en: {
        '01': 'Publishing & Web',
        '02': 'Web',
        '03': 'Motion',
        '04': 'Poster',
        '05': 'Web',
        '06': 'Publishing',
        '07': 'Poster',
        '08': 'Visual identity',
        '09': 'Visual identity',
        '10': 'Poster',
        '11': 'Publishing',
        '12': 'Illustration'
      }
    };

    /* =========================
       DIMENSIONS
    ========================== */

    const projectDimensions = {
      fr: {
        '01': '21 ྾ 29,7 cm',
        '02': 'Responsive',
        '03': '≃ 1 ྾ 3 m',
        '04': '29,7 × 42 cm',
        '05': 'Responsive',
        '06': '14 × 20 cm',
        '07': '40 × 60 cm',
        '08': '10 × 15 cm, 60 × 80 cm ',
        '09': '14,8 × 21 cm',
        '10': '60 × 80 cm',
        '11': '21 × 29,7 cm',
        '12': '30 × 30 cm',

       
      },
      en: {
        '01': '21 ྾ 29,7 cm',
        '02': 'Responsive',
        '03': '≃ 1 ྾ 3 m',
        '04': '29,7 × 42 cm',
        '05': 'Responsive',
        '06': '14 × 20 cm',
        '07': '40 × 60 cm',
        '08': '10 × 15 cm, 60 × 80 cm ',
        '09': '14,8 × 21 cm',
        '10': '60 × 80 cm',
        '11': '21 × 29,7 cm',
        '12': '30 × 30 cm',

      }
    };
  
    /* =========================
       COULEURS FOOTER
    ========================= */
  
    const projectFooterHues = {
      '01': 200,
      '02': 210,
      '03': 220,
      '04': 265,
      '05': 185,
      '06': 170,
      '07': 155,
      '08': 140,
      '09': 120,
      '10': 95,
      '11': 70,
      '12': 45
    };
  
    let currentProject = '01';
  
    /* =========================
       UPDATE PROJET ACTIF
    ========================= */
  
    function updateActiveProject(projectId) {
      currentProject = projectId;
  
      subheaderLinks.forEach(link => {
        link.classList.toggle(
          'active',
          link.getAttribute('data-project') === projectId
        );
      });
  
      footerText.innerHTML =
        projectDescriptions[currentLang]?.[projectId] || '';
  
      footerMedium.textContent =
        projectMediums[currentLang]?.[projectId] || '';

      // Ajout des dimensions dans le footer
      footerDimensions.textContent =
        projectDimensions[currentLang]?.[projectId] || '';
  
      const hue = projectFooterHues[projectId] ?? 200;
      document.documentElement.style.setProperty('--footer-hue', hue);
    }
  
    /* =========================
       SCROLL CARROUSEL
    ========================= */
  
    carousel.addEventListener('scroll', () => {
      const center = carousel.scrollLeft + carousel.offsetWidth / 2;
      let closestItem = null;
      let minDistance = Infinity;
  
      carouselItems.forEach(item => {
        const itemCenter = item.offsetLeft + item.offsetWidth / 2;
        const distance = Math.abs(center - itemCenter);
  
        if (distance < minDistance) {
          minDistance = distance;
          closestItem = item;
        }
      });
  
      if (closestItem) {
        const projectId = closestItem.getAttribute('data-project');
        if (projectId !== currentProject) {
          updateActiveProject(projectId);
        }
      }
    });
  
    carousel.addEventListener('wheel', (e) => {
      e.preventDefault();
  
      const scrollAmount =
        Math.abs(e.deltaX) > Math.abs(e.deltaY)
          ? e.deltaX
          : e.deltaY;
  
      carousel.scrollLeft += scrollAmount;
    }, { passive: false });
  
    /* =========================
       CLICK SUBHEADER
    ========================= */
  
    subheaderLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const projectId = link.dataset.project;
        const firstItem = document.querySelector(
          `.carousel-item[data-project="${projectId}"]`
        );
  
        if (firstItem) {
          carousel.scrollTo({
            left: firstItem.offsetLeft - 50,
            behavior: 'smooth'
          });
          updateActiveProject(projectId);
        }
      });
    });
  
    /* =========================
       MARQUER DÉBUT DE CHAQUE PROJET
    ========================= */
  
    let seenProjects = new Set();
  
    carouselItems.forEach((item, index) => {
      const projectId = item.getAttribute('data-project');
      
      if (!seenProjects.has(projectId)) {
        seenProjects.add(projectId);
        if (index !== 0) {
          item.classList.add('project-start');
        }
      }
    });
  
    /* =========================
       EFFET SCROLL FOOTER
    ========================= */
  
    let scrollTimeout;
    window.addEventListener("scroll", () => {
      footer.classList.add("footer-scrolling");
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        footer.classList.remove("footer-scrolling");
      }, 150);
    });
  
    /* =========================
       LANGUE
    ========================= */
  
    function updateLanguage(lang) {
      currentLang = lang;
      document.documentElement.setAttribute("lang", lang);
  
      document.querySelectorAll("[data-fr]").forEach(el => {
        el.textContent = el.dataset[lang];
      });
  
      langToggle.textContent = lang === "fr" ? "EN" : "FR";
      localStorage.setItem("lang", lang);
  
      updateActiveProject(currentProject);
    }
  
    if (langToggle) {
      langToggle.addEventListener("click", () => {
        updateLanguage(currentLang === "fr" ? "en" : "fr");
      });
    }
  
    /* =========================
       INIT
    ========================= */
  
    updateLanguage(currentLang);

/* =========================
   WAITING SCREEN — FIRST LOAD ONLY
========================= */

document.addEventListener("DOMContentLoaded", () => {
  const waitingScreen = document.getElementById("waitingScreen");
  const siteContent = document.getElementById("siteContent");
  const hasSeenIntro = sessionStorage.getItem("hasSeenIntro");

  if (!waitingScreen || !siteContent) return;

  // Si déjà vu → pas d’intro, pas de blur
  if (hasSeenIntro) {
    waitingScreen.remove();
    siteContent.classList.remove("is-blurred");
    return;
  }

  // On attend que TOUT soit chargé
  window.addEventListener("load", () => {
    setTimeout(() => {
      // Fade out overlay
      waitingScreen.style.opacity = "0";

      // Déblur progressif
      siteContent.classList.remove("is-blurred");

      // Nettoyage
      setTimeout(() => {
        waitingScreen.remove();
      }, 4000);

      sessionStorage.setItem("hasSeenIntro", "true");
    }, 300);
  });
  /* =========================
   LAZY LOAD VIDEOS PRO
========================= */

const videos = document.querySelectorAll("video");

const videoObserver = new IntersectionObserver((entries, observer) => {
  entries.forEach(entry => {
    const video = entry.target;

    if (entry.isIntersecting) {
      if (!video.src) {
        video.src = video.dataset.src;
        video.load();
      }
      video.play();
    } else {
      video.pause();
    }
  });
}, {
  root: document.querySelector("#carousel"),
  threshold: 0.6
});

videos.forEach(video => {
  videoObserver.observe(video);
});
});


    
</script>

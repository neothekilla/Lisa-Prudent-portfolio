<script>

  /* =========================
     LANGUE
  ========================= */
  
  const langToggle = document.getElementById("langToggle");
  let currentLang = localStorage.getItem("lang") || "fr";
  
  /* =========================
     CARROUSEL & UI
  ========================= */
  
  const carousel = document.getElementById('carousel');
  const carouselItems = document.querySelectorAll('.carousel-item');
  const subheaderLinks = document.querySelectorAll('.subheader a');
  const footerText = document.getElementById('footerText');
  const footerMedium = document.getElementById('footerMedium');
  const footerDimensions = document.getElementById('footerDimensions');
  const footer = document.querySelector('footer');
  
  /* =========================
     SMART LAZY LOAD FUNCTION
  ========================= */
  
  function initLazyLoad() {
  
  const mediaObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
  
      const el = entry.target;
  
      if (entry.isIntersecting) {
  
        if (el.tagName === "IMG" && el.dataset.src) {
  
          el.src = el.dataset.src;
  
          el.onload = () => {
            el.classList.add("is-loaded");
          };
  
          el.removeAttribute("data-src");
        }
  
        if (el.tagName === "VIDEO" && el.dataset.src) {
  
          el.src = el.dataset.src;
          el.load();
  
          el.onloadeddata = () => {
            el.classList.add("is-loaded");
          };
        }
  
        if (el.tagName === "VIDEO") {
          el.play();
        }
  
      } else {
  
        if (el.tagName === "VIDEO") {
          el.pause();
        }
  
      }
  
    });
  },
  {
    root: document.querySelector("#carousel"),
    rootMargin: "200px",
    threshold: 0.1
  });
  
  document.querySelectorAll("img, video").forEach(el => {
    mediaObserver.observe(el);
  });
  
  }
  
  /* =========================
     DESCRIPTIONS PROJETS
  ========================= */
  
  const projectDescriptions = { /* ton objet inchangé */ };
  
  /* =========================
     MÉDIUMS
  ========================= */
  
  const projectMediums = { /* inchangé */ };
  
  /* =========================
     DIMENSIONS
  ========================= */
  
  const projectDimensions = { /* inchangé */ };
  
  /* =========================
     COULEURS FOOTER
  ========================= */
  
  const projectFooterHues = {
    '01': 200,
    '02': 210,
    '03': 220,
    '04': 265,
    '05': 185,
    '06': 170,
    '07': 155,
    '08': 140,
    '09': 120,
    '10': 95,
    '11': 70,
    '12': 45
  };
  
  let currentProject = '01';
  
  /* =========================
     UPDATE PROJET ACTIF
  ========================= */
  
  function updateActiveProject(projectId) {
  
    currentProject = projectId;
  
    subheaderLinks.forEach(link => {
  
      link.classList.toggle(
        'active',
        link.getAttribute('data-project') === projectId
      );
  
    });
  
    footerText.innerHTML =
      projectDescriptions[currentLang]?.[projectId] || '';
  
    footerMedium.textContent =
      projectMediums[currentLang]?.[projectId] || '';
  
    footerDimensions.textContent =
      projectDimensions[currentLang]?.[projectId] || '';
  
    const hue = projectFooterHues[projectId] ?? 200;
  
    document.documentElement
      .style.setProperty('--footer-hue', hue);
  }
  
  /* =========================
     SCROLL CARROUSEL
  ========================= */
  
  carousel.addEventListener('scroll', () => {
  
    const center = carousel.scrollLeft + carousel.offsetWidth / 2;
  
    let closestItem = null;
    let minDistance = Infinity;
  
    carouselItems.forEach(item => {
  
      const itemCenter = item.offsetLeft + item.offsetWidth / 2;
      const distance = Math.abs(center - itemCenter);
  
      if (distance < minDistance) {
  
        minDistance = distance;
        closestItem = item;
  
      }
  
    });
  
    if (closestItem) {
  
      const projectId = closestItem.getAttribute('data-project');
  
      if (projectId !== currentProject) {
        updateActiveProject(projectId);
      }
  
    }
  
  });
  
  carousel.addEventListener('wheel', (e) => {
  
    e.preventDefault();
  
    const scrollAmount =
      Math.abs(e.deltaX) > Math.abs(e.deltaY)
        ? e.deltaX
        : e.deltaY;
  
    carousel.scrollLeft += scrollAmount;
  
  }, { passive: false });
  
  /* =========================
     CLICK SUBHEADER
  ========================= */
  
  subheaderLinks.forEach(link => {
  
    link.addEventListener('click', (e) => {
  
      e.preventDefault();
  
      const projectId = link.dataset.project;
  
      const firstItem = document.querySelector(
        `.carousel-item[data-project="${projectId}"]`
      );
  
      if (firstItem) {
  
        carousel.scrollTo({
          left: firstItem.offsetLeft - 50,
          behavior: 'smooth'
        });
  
        updateActiveProject(projectId);
  
      }
  
    });
  
  });
  
  /* =========================
     MARQUER DÉBUT PROJET
  ========================= */
  
  let seenProjects = new Set();
  
  carouselItems.forEach((item, index) => {
  
    const projectId = item.getAttribute('data-project');
  
    if (!seenProjects.has(projectId)) {
  
      seenProjects.add(projectId);
  
      if (index !== 0) {
        item.classList.add('project-start');
      }
  
    }
  
  });
  
  /* =========================
     EFFET SCROLL FOOTER
  ========================= */
  
  let scrollTimeout;
  
  window.addEventListener("scroll", () => {
  
    footer.classList.add("footer-scrolling");
  
    clearTimeout(scrollTimeout);
  
    scrollTimeout = setTimeout(() => {
      footer.classList.remove("footer-scrolling");
    }, 150);
  
  });
  
  /* =========================
     LANGUE
  ========================= */
  
  function updateLanguage(lang) {
  
    currentLang = lang;
  
    document.documentElement
      .setAttribute("lang", lang);
  
    document.querySelectorAll("[data-fr]").forEach(el => {
      el.textContent = el.dataset[lang];
    });
  
    langToggle.textContent =
      lang === "fr" ? "EN" : "FR";
  
    localStorage.setItem("lang", lang);
  
    updateActiveProject(currentProject);
  
  }
  
  if (langToggle) {
  
    langToggle.addEventListener("click", () => {
      updateLanguage(currentLang === "fr" ? "en" : "fr");
    });
  
  }
  
  /* =========================
     INIT
  ========================= */
  
  updateLanguage(currentLang);
  
  /* =========================
     WAITING SCREEN
  ========================= */
  
  document.addEventListener("DOMContentLoaded", () => {
  
    const waitingScreen =
      document.getElementById("waitingScreen");
  
    const siteContent =
      document.getElementById("siteContent");
  
    const hasSeenIntro =
      sessionStorage.getItem("hasSeenIntro");
  
    if (!waitingScreen || !siteContent) return;
  
    if (hasSeenIntro) {
  
      waitingScreen.remove();
      siteContent.classList.remove("is-blurred");
  
    }
  
    window.addEventListener("load", () => {
  
      setTimeout(() => {
  
        waitingScreen.style.opacity = "0";
        siteContent.classList.remove("is-blurred");
  
        setTimeout(() => {
          waitingScreen.remove();
        }, 4000);
  
        sessionStorage.setItem("hasSeenIntro", "true");
  
      }, 300);
  
    });
  
    /* LAZY LOAD */
    initLazyLoad();
  
  });
  
  /* =========================
     RETOUR NAVIGATION (ABOUT)
  ========================= */
  
  window.addEventListener("pageshow", (event) => {
  
    if (event.persisted) {
      initLazyLoad();
    }
  
  });
  
  </script>
